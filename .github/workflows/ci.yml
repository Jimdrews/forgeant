name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gcc:
    name: GCC 14 (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install GCC 14
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "00d9442575c9f66ce33eb29faadef341cb4cefda"

      - name: Configure
        run: cmake --preset ci
        env:
          CC: gcc-14
          CXX: g++-14

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

      - name: Build benchmarks
        run: cmake --build --preset ci --target forgeant_benchmarks

  clang:
    name: Clang 19 (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Clang 19
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-19

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "00d9442575c9f66ce33eb29faadef341cb4cefda"

      - name: Configure
        run: cmake --preset ci
        env:
          CC: clang-19
          CXX: clang++-19

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

  macos:
    name: AppleClang (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "00d9442575c9f66ce33eb29faadef341cb4cefda"

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

  sanitizers:
    name: ASan + UBSan (Clang 19)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Clang 19
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-19

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "00d9442575c9f66ce33eb29faadef341cb4cefda"

      - name: Configure
        run: cmake --preset asan
        env:
          CC: clang-19
          CXX: clang++-19

      - name: Build
        run: cmake --build --preset asan

      - name: Test
        run: ctest --preset asan

  valgrind:
    name: Valgrind Memcheck (GCC 14)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install GCC 14 and Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 valgrind

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "00d9442575c9f66ce33eb29faadef341cb4cefda"

      - name: Configure
        run: cmake --preset valgrind
        env:
          CC: gcc-14
          CXX: g++-14

      - name: Build
        run: cmake --build --preset valgrind

      - name: Memcheck
        run: valgrind --leak-check=full --error-exitcode=1 --show-leak-kinds=all --track-origins=yes build/valgrind/tests/forgeant_tests

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Clang 19 tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-19 clang-tidy-19

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "00d9442575c9f66ce33eb29faadef341cb4cefda"

      - name: Configure
        run: cmake --preset dev
        env:
          CC: clang-19
          CXX: clang++-19

      - name: Run clang-tidy
        run: |
          find include src -name '*.hpp' -o -name '*.cpp' | \
            xargs clang-tidy-19 -p build/dev --warnings-as-errors='*'

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-19

      - name: Check formatting
        run: |
          find include src tests -name '*.hpp' -o -name '*.cpp' | \
            xargs clang-format-19 --dry-run --Werror
