name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

jobs:
  gcc:
    name: GCC 13 (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 13
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "01f602195983451bc83e72f4214af2cbc495aa94"

      - name: Configure
        run: cmake --preset ci
        env:
          CC: gcc-13
          CXX: g++-13

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

  clang:
    name: Clang 17 (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 17
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main"
          sudo apt-get update
          sudo apt-get install -y clang-17

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "01f602195983451bc83e72f4214af2cbc495aa94"

      - name: Configure
        run: cmake --preset ci
        env:
          CC: clang-17
          CXX: clang++-17

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

  macos:
    name: AppleClang (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "01f602195983451bc83e72f4214af2cbc495aa94"

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset ci

  sanitizers:
    name: ASan + UBSan (Clang 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 17
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main"
          sudo apt-get update
          sudo apt-get install -y clang-17

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "01f602195983451bc83e72f4214af2cbc495aa94"

      - name: Configure
        run: cmake --preset asan
        env:
          CC: clang-17
          CXX: clang++-17

      - name: Build
        run: cmake --build --preset asan

      - name: Test
        run: ctest --preset asan

  valgrind:
    name: Valgrind Memcheck (GCC 13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 13 and Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 valgrind

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "01f602195983451bc83e72f4214af2cbc495aa94"

      - name: Configure
        run: cmake --preset valgrind
        env:
          CC: gcc-13
          CXX: g++-13

      - name: Build
        run: cmake --build --preset valgrind

      - name: Memcheck
        run: cd build/valgrind && ctest -T memcheck --output-on-failure
        env:
          VALGRIND_OPTS: "--leak-check=full --error-exitcode=1 --show-leak-kinds=all --track-origins=yes"

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 17 tools
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main"
          sudo apt-get update
          sudo apt-get install -y clang-17 clang-tidy-17

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "01f602195983451bc83e72f4214af2cbc495aa94"

      - name: Configure
        run: cmake --preset dev
        env:
          CC: clang-17
          CXX: clang++-17

      - name: Run clang-tidy
        run: |
          find include src -name '*.hpp' -o -name '*.cpp' | \
            xargs clang-tidy-17 -p build/dev --warnings-as-errors='*'

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main"
          sudo apt-get update
          sudo apt-get install -y clang-format-17

      - name: Check formatting
        run: |
          find include src tests -name '*.hpp' -o -name '*.cpp' | \
            xargs clang-format-17 --dry-run --Werror
