<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <!-- Anvil mark -->
  <g fill="#e2e8f0">
    <!-- Anvil body -->
    <rect x="8" y="28" width="48" height="24" rx="2"/>
    <!-- Anvil horn (left taper) -->
    <polygon points="8,36 0,40 8,44"/>
    <!-- Anvil base -->
    <rect x="14" y="52" width="36" height="8" rx="1"/>
    <rect x="18" y="48" width="28" height="6"/>
    <!-- Anvil top (flat working surface) -->
    <rect x="4" y="24" width="56" height="6" rx="2"/>
    <!-- Spark nodes -->
    <circle cx="26" cy="14" r="3.5"/>
    <circle cx="38" cy="8" r="2.5"/>
    <circle cx="48" cy="16" r="2"/>
    <!-- Spark connections -->
    <line x1="26" y1="14" x2="38" y2="8" stroke="#e2e8f0" stroke-width="1.5"/>
    <line x1="38" y1="8" x2="48" y2="16" stroke="#e2e8f0" stroke-width="1.5"/>
    <line x1="26" y1="14" x2="48" y2="16" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
  <!-- Wordmark -->
  <text x="72" y="50" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="46" font-weight="800" fill="#e2e8f0" letter-spacing="-1">forgeant</text>
</svg>
