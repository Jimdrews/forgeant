    <rect x="18" y="26" width="14" height="30" rx="3" fill="#e2e8f0"/>
  </g>
  <!-- Wordmark (centered) -->
  <text x="205" y="42" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="46" font-weight="800" fill="#e2e8f0" letter-spacing="-1">forgeant</text>
  <!-- Right hammer (flipped) -->
